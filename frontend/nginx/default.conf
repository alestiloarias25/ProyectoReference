server {
    listen 80;
    server_name referenciate.com www.referenciate.com;
    return 301 https://$host$request_uri; # Redirige todo a HTTPS
}

server {
    listen 443 ssl;
    server_name referenciate.com www.referenciate.com;

    ssl_certificate /etc/letsencrypt/live/referenciate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/referenciate.com/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
